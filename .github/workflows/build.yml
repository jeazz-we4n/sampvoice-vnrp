name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
      - 'main' # Thêm main cho chắc ăn
  pull_request:
    branches:
      - '*'
      - '*/*'
      - '**'

jobs:
  build-windows-release:
    runs-on: windows-latest # ĐÃ SỬA: Dùng máy Windows xịn nhất
    steps:
      - uses: actions/checkout@v4 # Cập nhật version action
        with:
          clean: true
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5 # Cập nhật version action
        with:
          python-version: '3.x'

      - name: Install latest conan
        run: |
          python -m pip install --upgrade pip
          pip install conan

      - name: Generate build files
        run: |
          mkdir build
          cd build
          # ĐÃ SỬA: Bỏ cái Visual Studio 2019 đi, để CMake tự động nhận bản mới nhất của máy ảo
          cmake -DCMAKE_BUILD_TYPE=Release .. -A Win32
          cmake --build . --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4 # Cập nhật version action
        with:
          name: sampvoice-win-release
          path: |
            build/client/Release/*.asi 
            build/server/Release/*.dll
            # ĐÃ SỬA: Lấy MỌI file .asi (cho client) và .dll (cho server)

  build-linux-release:
    runs-on: ubuntu-latest # ĐÃ SỬA: Dùng máy Linux mới nhất, thoát kiếp bị treo
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          submodules: recursive
          fetch-depth: 0

      - name: Install packages
        run: sudo apt-get update && sudo apt-get install g++-multilib -y

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install latest conan
        run: |
          python -m pip install --upgrade pip
          pip install conan

      - name: Generate build files
        run: mkdir build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sampvoice-linux-release
          path: build/server/*.so # File Linux thì chỉ có server plugin thôi
