name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  build-windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          submodules: recursive
          fetch-depth: 0

      # ĐÂY LÀ BƯỚC BẢO HIỂM: Ép máy chủ GitHub phải móc hết ruột cháu chắt về
      - name: Force Download All Deep Submodules
        run: git submodule update --init --recursive --force

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Conan 1.x
        run: |
          python -m pip install --upgrade pip
          pip install "conan<2.0"

      - name: Generate build files
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release .. -A Win32
          
      - name: Build Project
        run: |
          cd build
          cmake --build . --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sampvoice-win-release
          path: |
            build/client/Release/*.asi 
            build/server/Release/*.dll

  build-linux-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          submodules: recursive
          fetch-depth: 0

      # ĐÂY LÀ BƯỚC BẢO HIỂM (Cho bản Linux)
      - name: Force Download All Deep Submodules
        run: git submodule update --init --recursive --force

      - name: Install packages
        run: sudo apt-get update && sudo apt-get install g++-multilib -y

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Conan 1.x
        run: |
          python -m pip install --upgrade pip
          pip install "conan<2.0"

      - name: Generate build files
        run: mkdir build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32

      - name: Build Project
        run: |
          cd build
          cmake --build . --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sampvoice-linux-release
          path: build/server/*.so
