name: Build Client Only

on:
  workflow_dispatch:
  push:
    branches:
      - '*'

jobs:
  build-windows-client:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Force Download All Submodules Manually
        shell: bash
        run: |
          rm -rf lib/omp-sdk
          git clone --recursive https://github.com/openmultiplayer/open.mp-sdk.git lib/omp-sdk
          rm -rf lib/omp-net
          git clone --recursive https://github.com/openmultiplayer/open.mp-network.git lib/omp-net

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Conan 1.x
        run: |
          python -m pip install --upgrade pip
          pip install "conan<2.0"

      # --- BƯỚC ÉP XUNG: CHÍCH THẲNG DIRECTX VÀO TRÌNH BIÊN DỊCH WINDOWS ---
      - name: Inject DirectX SDK strictly to Windows Compiler
        shell: cmd
        run: |
          git clone https://github.com/testing-laboratory/DirectX-SDK-June2010.git dxsdk
          echo DXSDK_DIR=%GITHUB_WORKSPACE%\dxsdk\>> %GITHUB_ENV%
          echo INCLUDE=%GITHUB_WORKSPACE%\dxsdk\Include;%INCLUDE%>> %GITHUB_ENV%
          echo LIB=%GITHUB_WORKSPACE%\dxsdk\Lib\x86;%LIB%>> %GITHUB_ENV%

      - name: Generate build files
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release .. -A Win32
          
      - name: Build Project
        run: |
          cd build
          cmake --build . --config Release

      # --- ÉP NÓ CHỈ TRẢ VỀ FILE TRONG THƯ MỤC CLIENT ---
      - name: Upload Client Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sampvoice-client-asi
          path: build/client/Release/*.dll
