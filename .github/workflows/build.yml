name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  build-windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Force Download All Submodules Manually
        shell: bash
        run: |
          rm -rf lib/omp-sdk
          git clone --recursive https://github.com/openmultiplayer/open.mp-sdk.git lib/omp-sdk
          rm -rf lib/omp-net
          git clone --recursive https://github.com/openmultiplayer/open.mp-network.git lib/omp-net

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Conan 1.x
        run: |
          python -m pip install --upgrade pip
          pip install "conan<2.0"

      # BƯỚC PHÉP THUẬT: Tải DirectX SDK 2010 để ép nó build Client!
      - name: Setup DirectX SDK
        shell: bash
        run: |
          git clone https://github.com/testing-laboratory/DirectX-SDK-June2010.git dxsdk
          DX_PATH=$(pwd -W)/dxsdk/
          echo "DXSDK_DIR=$DX_PATH" >> $GITHUB_ENV

      - name: Generate build files
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release .. -A Win32
          
      - name: Build Project
        run: |
          cd build
          cmake --build . --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sampvoice-win-release
          path: |
            build/**/*.dll
            build/**/*.asi

  build-linux-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Force Download All Submodules Manually
        shell: bash
        run: |
          rm -rf lib/omp-sdk
          git clone --recursive https://github.com/openmultiplayer/open.mp-sdk.git lib/omp-sdk
          rm -rf lib/omp-net
          git clone --recursive https://github.com/openmultiplayer/open.mp-network.git lib/omp-net

      - name: Install packages
        run: sudo apt-get update && sudo apt-get install g++-multilib -y

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Conan 1.x
        run: |
          python -m pip install --upgrade pip
          pip install "conan<2.0"

      - name: Generate build files
        run: mkdir build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32

      - name: Build Project
        run: |
          cd build
          cmake --build . --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sampvoice-linux-release
          path: build/**/*.so
